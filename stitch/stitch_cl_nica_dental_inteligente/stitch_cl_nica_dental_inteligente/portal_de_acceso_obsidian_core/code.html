        body {
            font-family: 'Inter', sans-serif;
            background-color: #131313;

            background-image: radial-gradient(circle at 2px 2px, #2a2a2a 1px, transparent 0);

            backdrop-filter: blur(20px);

        }

<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-6 kinetic-mesh overflow-hidden">
<!-- Decorative Elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary-container opacity-[0.03] blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-tertiary-container opacity-[0.03] blur-[120px] rounded-full"></div>
</div>
<!-- Main Portal Container -->
<main class="relative z-10 w-full max-w-[440px]">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-12 h-12 bg-surface-container-high rounded-lg flex items-center justify-center mb-4 shadow-[0px_0px_20px_rgba(255,122,0,0.15)] border-b border-primary/20">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">dentistry</span>
</div>
<h1 class="text-2xl font-black tracking-tighter text-primary uppercase">OdontoCore</h1>
<p class="text-on-surface-variant text-sm tracking-widest uppercase mt-1 opacity-70">Clinical Intelligence Unit</p>
</div>
<!-- Login Card -->
<div class="glass-effect rounded-xl border-t border-white/5 p-8 shadow-[0px_24px_48px_rgba(0,0,0,0.5)]">
<div class="mb-8">
<h2 class="text-xl font-bold tracking-tight text-on-surface">System Authentication</h2>
<p class="text-on-surface-variant text-sm mt-1">Initialize secure session via encrypted gateway.</p>
</div>
<form class="space-y-6">
<!-- Input Field: Identifier -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1">Terminal ID / Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg transition-colors group-focus-within:text-primary">person</span>
<input class="w-full bg-surface-container-low border-b border-outline-variant focus:border-primary text-on-surface placeholder:text-on-surface-variant/30 py-3 pl-10 pr-4 outline-none transition-all duration-200 focus:ring-0" placeholder="clinical_admin_01" type="text"/>
</div>
</div>
<!-- Input Field: Access Key -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant ml-1">Access Key</label>
<a class="text-[10px] font-bold uppercase tracking-widest text-primary hover:text-primary-fixed-dim transition-colors" href="#">Recover Key</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full bg-surface-container-low border-b border-outline-variant focus:border-primary text-on-surface placeholder:text-on-surface-variant/30 py-3 pl-10 pr-4 outline-none transition-all duration-200 focus:ring-0" placeholder="••••••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Auth Actions -->
<div class="pt-2">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-black uppercase tracking-tighter rounded-lg shadow-[0px_8px_16px_rgba(255,122,0,0.2)] hover:shadow-[0px_12px_24px_rgba(255,122,0,0.3)] hover:-translate-y-0.5 transition-all active:scale-95 flex items-center justify-center gap-2">
                        Execute Access
                        <span class="material-symbols-outlined text-xl">login</span>
</button>
</div>
</form>
<!-- Social/Alt Auth -->
<div class="mt-8">
<div class="relative flex items-center justify-center mb-6">
<div class="absolute w-full h-px bg-outline-variant/30"></div>
<span class="relative px-4 bg-[#0e0e0e]/0 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant backdrop-blur-md">Alternative Protocols</span>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 bg-surface-container-high hover:bg-surface-variant transition-colors rounded-lg border-b border-transparent hover:border-outline-variant group">
<img alt="Google" class="w-4 h-4 grayscale group-hover:grayscale-0 transition-all" data-alt="minimalist google logo icon on dark background for secondary authentication" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC7oCZYF-yJ8HvDqqVGzgIm6J_B16Pw348Hub_KlLRwLNtn1FyBghryvOtnqUFsKjoU5gTlnbxsmJG0I88knNIxOdM4VYtKApEkvjYFNs0nrAVJTxrD2zqVCjlEwax6QwSZQqUSvMShmFRJ-fesIqA72WEoJiWaTudVKDcyCNTzblnFxvRn3V1sLYzMUTkTyhdxSLczmkuZo07990_J5f8GSmKLijAKwUn_yzEDH5hA7f5hr4g2C2Jn4QVMJUzUQdyNHIHYEnR4OMz3"/>
<span class="text-[11px] font-bold uppercase tracking-widest">Google Auth</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 bg-surface-container-high hover:bg-surface-variant transition-colors rounded-lg border-b border-transparent hover:border-outline-variant group">
<span class="material-symbols-outlined text-lg grayscale group-hover:grayscale-0 text-on-surface transition-all">fingerprint</span>
<span class="text-[11px] font-bold uppercase tracking-widest">Biometric</span>
</button>
</div>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-8 flex flex-col items-center space-y-4">
<p class="text-on-surface-variant text-xs">
                Unregistered terminal? <a class="text-primary font-bold hover:underline" href="#">Request Credentials</a>
</p>
<div class="flex items-center gap-6 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/40">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[12px]" style="font-variation-settings: 'FILL' 1;">verified_user</span> AES-256 SECURED</span>
<span>SYSTEM v4.0.2</span>
</div>

<!-- Visual Accents -->
<div class="fixed bottom-10 left-10 hidden lg:block">
<div class="p-4 border-l border-primary-container/20">
<div class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-2">Live Telemetry</div>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<div class="text-[10px] font-mono text-primary/60">NODE_CONNECTED: PAR-04</div>
</div>
